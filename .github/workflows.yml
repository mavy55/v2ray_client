name: CI

on:
  push: {}
  pull_request: {}

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  ci:
    name: ${{ matrix.name }} CI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: android
            os: ubuntu-latest
          - name: ios
            os: macos-latest
      fail-fast: false

    env:
      FLUTTER_CHANNEL: stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.pub-cache/bin
          key: ${{ runner.os }}-pub-${{ matrix.name }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ matrix.name }}-
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Set up JDK (Android)
        if: matrix.name == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Gradle (Android)
        if: matrix.name == 'android'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.name }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.name }}-
            ${{ runner.os }}-gradle-

      - name: Build Android APK
        if: matrix.name == 'android'
        run: flutter build apk --split-per-abi --release

      - name: Upload Android artifacts
        if: matrix.name == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Build iOS (no-codesign)
        if: matrix.name == 'ios'
        run: |
          flutter build ios --no-codesign --release
          # zip the Runner.app so the artifact is uploaded as a single file
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cd build/ios/iphoneos
            zip -r Runner.app.zip Runner.app
            cd -
          fi

      - name: Upload iOS artifacts
        if: matrix.name == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: build/ios/iphoneos/Runner.app.zip
